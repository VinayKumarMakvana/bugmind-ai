version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - bugmind-network

  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - bugmind-db:/app/data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///./data/bugmind.db
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      - redis
    networks:
      - bugmind-network

  worker:
    build: 
      context: ./backend
      dockerfile: worker.Dockerfile
    volumes:
      - bugmind-db:/app/data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///./data/bugmind.db
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      - redis
      - api
    networks:
      - bugmind-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1 # Browser needs to access localhost
    depends_on:
      - api
    networks:
      - bugmind-network

networks:
  bugmind-network:
    driver: bridge

volumes:
  bugmind-db:
